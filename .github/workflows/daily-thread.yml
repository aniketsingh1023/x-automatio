name: Daily Tech Thread

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  # 4 runs per day → 20 tweets total (5 per thread)
  # 9:00 AM IST  = 03:30 UTC
  # 12:00 PM IST = 06:30 UTC
  # 3:00 PM IST  = 09:30 UTC
  # 6:00 PM IST  = 12:30 UTC
  schedule:
    - cron: '30 3 * * *'
    - cron: '30 6 * * *'
    - cron: '30 9 * * *'
    - cron: '30 12 * * *'

  # Allow manual dispatch from the GitHub Actions UI
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Preview thread without posting'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      force_puppeteer:
        description: 'Use Puppeteer instead of Twitter API'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      log_level:
        description: 'Log verbosity'
        required: false
        default: 'info'
        type: choice
        options: ['error', 'warn', 'info', 'debug']

# ── Job ───────────────────────────────────────────────────────────────────────
jobs:
  post-thread:
    name: Generate & Post Thread
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ──────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. npm install ──────────────────────────────────────────────────────
      - name: Install Node dependencies
        run: npm ci

      # ── 4. Puppeteer system deps ─────────────────────────────────────────────
      # These are needed for headless Chromium on GitHub's Ubuntu runner.
      # The `|| true` prevents failure if a package is already installed.
      - name: Install Puppeteer system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            chromium-browser \
            libatk-bridge2.0-0 \
            libdrm2 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgbm1 \
            libxkbcommon0 \
            libpango-1.0-0 \
            libcairo2 \
            fonts-liberation \
            libasound2 \
            libnspr4 \
            libnss3 \
            libatk1.0-0 \
            libatspi2.0-0 \
            libcups2 \
            libxss1 \
            libxtst6 || true

      # ── 5. Restore data cache (posted_articles + cookies) ────────────────────
      # This is the key to idempotency across runs.
      # We always restore the latest available cache regardless of branch/commit.
      - name: Restore data cache
        id: restore-cache
        uses: actions/cache@v4
        with:
          path: data/
          key: x-automatio-data-${{ github.run_id }}
          restore-keys: |
            x-automatio-data-

      # ── 6. Run automation ────────────────────────────────────────────────────
      - name: Run thread automation
        env:
          # Gemini AI
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-1.5-flash

          # Twitter API v2 (primary)
          TWITTER_APP_KEY: ${{ secrets.TWITTER_APP_KEY }}
          TWITTER_APP_SECRET: ${{ secrets.TWITTER_APP_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}

          # Twitter credentials (Puppeteer fallback)
          TWITTER_USERNAME: ${{ secrets.TWITTER_USERNAME }}
          TWITTER_PASSWORD: ${{ secrets.TWITTER_PASSWORD }}
          TWITTER_EMAIL: ${{ secrets.TWITTER_EMAIL }}

          # Runtime flags
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          FORCE_PUPPETEER: ${{ github.event.inputs.force_puppeteer || 'false' }}
          LOG_LEVEL: ${{ github.event.inputs.log_level || 'info' }}
          TOP_ARTICLES_COUNT: '3'

          # Tell Puppeteer to use the system Chromium
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
          PUPPETEER_SKIP_DOWNLOAD: 'true'

        run: node scripts/main.js

      # ── 7. Save data cache ───────────────────────────────────────────────────
      # Always save so the next run inherits the updated posted_articles.json
      - name: Save data cache
        if: always()
        uses: actions/cache@v4
        with:
          path: data/
          key: x-automatio-data-${{ github.run_id }}

      # ── 8. Upload logs on failure ────────────────────────────────────────────
      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs-${{ github.run_id }}
          path: data/logs/
          retention-days: 7
